name: build-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-x64
            runs_on: windows-latest
            python: "3.11"
            py_arch: x64
            out: "BMCU-Flasher-windows-x64.zip"

          - id: windows-x86
            runs_on: windows-latest
            python: "3.11"
            py_arch: x86
            out: "BMCU-Flasher-windows-x86.zip"

          - id: linux-x64
            runs_on: ubuntu-20.04
            python: "3.11"
            py_arch: x64
            out: "BMCU-Flasher-linux-x64.tar.gz"

          - id: linux-arm64
            runs_on: ubuntu-24.04-arm
            python: "3.11"
            py_arch: arm64
            out: "BMCU-Flasher-linux-arm64.tar.gz"

          - id: macos-x86_64
            runs_on: macos-15-intel
            python: "3.11"
            py_arch: x64
            arch: x86_64
            macos_deploy: "10.15"
            out: "BMCU-Flasher-macos-x86_64.zip"

          - id: macos-arm64
            runs_on: macos-15
            python: "3.11"
            py_arch: arm64
            arch: arm64
            macos_deploy: "11.0"
            out: "BMCU-Flasher-macos-arm64.zip"

    runs-on: ${{ matrix.runs_on }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          architecture: ${{ matrix.py_arch }}

      - name: Install deps
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -U pip
          python -m pip install pyinstaller pyserial

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          NAME="BMCU Flasher"

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            python -m PyInstaller --noconfirm --clean --windowed --name "$NAME" \
              --icon icon.ico \
              --add-data "bmcu320.png;." \
              --add-data "icon.png;." \
              --add-data "i18n;i18n" \
              bmcu_flasher_gui.py

            powershell -NoProfile -Command "Compress-Archive -Force -Path \"dist\\$NAME\\*\" -DestinationPath \"${{ matrix.out }}\""

          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            export MACOSX_DEPLOYMENT_TARGET="${{ matrix.macos_deploy }}"
            ARCH="${{ matrix.arch }}"

            python -m PyInstaller --noconfirm --clean --windowed --name "$NAME" \
              --target-architecture "$ARCH" \
              --icon icon.icns \
              --add-data "bmcu320.png:." \
              --add-data "icon.png:." \
              --add-data "i18n:i18n" \
              bmcu_flasher_gui.py

            ditto -c -k --sequesterRsrc --keepParent "dist/$NAME.app" "${{ matrix.out }}"

          else
            python -m PyInstaller --noconfirm --clean --windowed --name "$NAME" \
              --add-data "bmcu320.png:." \
              --add-data "icon.png:." \
              --add-data "i18n:i18n" \
              bmcu_flasher_gui.py

            tar -C dist -czf "${{ matrix.out }}" "$NAME"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}
          path: |
            BMCU-Flasher-*.zip
            BMCU-Flasher-*.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          find artifacts -type f \( -name "BMCU-Flasher-*.zip" -o -name "BMCU-Flasher-*.tar.gz" \) -exec cp -v {} out/ \;
          ls -lah out

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          name: "BMCU Flasher ${{ github.ref_name }}"
          generate_release_notes: true
          files: out/*
