name: build-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install -U pip
          python -m pip install pyinstaller pyserial

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          NAME="BMCU Flasher"

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            python -m PyInstaller --noconfirm --clean --windowed --name "$NAME" \
              --icon icon.ico \
              --add-data "bmcu320.png;." \
              --add-data "icon.png;." \
              bmcu_flasher_gui.py

            powershell -NoProfile -Command "Compress-Archive -Path 'dist\\$NAME\\*' -DestinationPath 'BMCU-Flasher-windows-x64.zip'"

          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            python3 -m PyInstaller --noconfirm --clean --windowed --name "$NAME" \
              --icon icon.icns \
              --add-data "bmcu320.png:." \
              --add-data "icon.png:." \
              bmcu_flasher_gui.py

            ditto -c -k --sequesterRsrc --keepParent "dist/$NAME.app" "BMCU-Flasher-macos.zip"

          else
            python3 -m PyInstaller --noconfirm --clean --windowed --name "$NAME" \
              --add-data "bmcu320.png:." \
              --add-data "icon.png:." \
              bmcu_flasher_gui.py

            tar -C dist -czf "BMCU-Flasher-linux-x64.tar.gz" "$NAME"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}
          path: |
            BMCU-Flasher-*.zip
            BMCU-Flasher-*.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect
        run: |
          mkdir -p out
          find artifacts -type f \( -name "BMCU-Flasher-*.zip" -o -name "BMCU-Flasher-*.tar.gz" \) -exec cp -v {} out/ \;
          ls -lah out

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          name: "BMCU Flasher ${{ github.ref_name }}"
          generate_release_notes: true
          files: out/*
